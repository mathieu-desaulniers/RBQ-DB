name: Scraping complet RBQ

on:
  workflow_dispatch:

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les librairies
        run: |
          pip install pandas gspread google-auth requests beautifulsoup4 openpyxl

      - name: Lancer le scraping complet
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python rbq_scraping_complet.py
